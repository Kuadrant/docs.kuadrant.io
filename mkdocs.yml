site_name: Kuadrant Documentation
site_url: https://docs.kuadrant.io/
repo_url: https://github.com/kuadrant/docs.kuadrant.io
edit_uri: edit/main/docs/
extra:
  version:
    provider: mike
    default:
      - 1.3.x
      - latest
theme:
  name: material
  logo: assets/images/logo.png
  custom_dir: overrides
  features:
    - content.action.edit
    - content.code.copy
extra_css:
  - assets/stylesheets/extra.css
watch:
  - overrides
markdown_extensions:
  - mdx_breakless_lists
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - footnotes
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
plugins:
  - mike:
      alias_type: symlink
      redirect_template: null
      deploy_prefix: ''
  - asciidoctor_backend:
      fail_on_error: true
  - search
  - gh-admonitions
  # Note: Try to avoid globs for `imports`. Be explicit about imports, so we can avoid having
  # published dangling docs with no routes to them from the nav/other pages - these will go stale quickly.
  - multirepo:
      cleanup: true
      keep_docs_dir: true
      nav_repos:
        - name: kuadrant-operator
          import_url: https://github.com/kuadrant/kuadrant-operator?edit_uri=/blob/main/&branch=main
