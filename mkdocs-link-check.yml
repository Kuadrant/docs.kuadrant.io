INHERIT: mkdocs.yml
validation:
  nav:
    not_found: warn
  links:
    not_found: warn
    anchors: warn
    # absolute links (e.g. /latest/getting-started) work on the live site but
    # can't be verified at build time — keep at info to avoid false positives
    absolute_links: info
    unrecognized_links: info
